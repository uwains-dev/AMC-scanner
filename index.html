<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMC QRコード読み取りシステム</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f7f6; text-align: center; }
    h2 { color: #2c3e50; font-size: 1.2rem; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 8px; overflow: hidden; background: #000; }
    .scan-list { margin-top: 20px; text-align: left; background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .scan-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; }
    .scan-item:last-child { border-bottom: none; }
    .btn-area { position: sticky; bottom: 20px; margin-top: 20px; }
    .btn-register { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px #27ae60; }
    .btn-register:active { transform: translateY(2px); box-shadow: 0 2px #27ae60; }
    .count-badge { background: #3498db; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <h2>AMC QRコード読み取りシステム</h2>
  <div id="reader"></div>
  
  <div class="scan-list">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:2px solid #3498db; padding-bottom:5px;">
      <span style="font-size:0.9rem; color:#666;">案件番号or部材名など</span>
      <span class="count-badge" id="scan-count">0 件</span>
    </div>
    <div id="result-list">
      <div style="color:#ccc; text-align:center; padding:10px;">スキャンしてください</div>
    </div>
  </div>

  <div class="btn-area">
    <button class="btn-register" onclick="sendDataToParent()">登録（アプリに戻る）</button>
  </div>

<script>
  let scannedValues = [];
  const html5QrCode = new Html5Qrcode("reader");

  // カメラ起動
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: { width: 250, height: 250 } },
    (decodedText) => {
      processScan(decodedText);
    },
    (errorMessage) => {}
  ).catch(err => alert("カメラ起動失敗: " + err));

  function processScan(val) {
    if (scannedValues.includes(val)) {
      playBeep(220, 0.3); // 重複時は低い音
      return;
    }

    playBeep(880, 0.1); // 成功時は高い音
    scannedValues.push(val);
    updateUI();
  }

  function updateUI() {
    const container = document.getElementById('result-list');
    const countBadge = document.getElementById('scan-count');
    countBadge.innerText = scannedValues.length + " 件";
    
    if (scannedValues.length === 0) {
      container.innerHTML = '<div style="color:#ccc; text-align:center; padding:10px;">スキャンしてください</div>';
      return;
    }

    container.innerHTML = scannedValues.slice().reverse().map((v, i) => `
      <div class="scan-item">
        <span>${v}</span>
        <span style="color:#3498db;">#${scannedValues.length - i}</span>
      </div>
    `).join('');
  }

  function playBeep(freq, duration) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }

  function sendDataToParent() {
    if (scannedValues.length === 0) {
      if (!confirm("データがありません。終了しますか？")) return;
    }
    
    // 元のアプリ（window.opener）にデータを送信
    if (window.opener) {
      window.opener.postMessage({
        type: 'AMC_QR_SCAN_RESULT',
        data: scannedValues
      }, "*");
    }
    
    // 画面を閉じる
    window.close();
  }
</script>
</body>
</html>
